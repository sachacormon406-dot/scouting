<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joueurs à suivre — Scouting Tracker</title>
<link rel="icon" type="image/png" href="favicon.png">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f8f8f6;color:#1a1a1a;padding:1.5rem}
.wrap{max-width:1500px;margin:0 auto}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:12px}
.title{font-size:20px;font-weight:500}
.subtitle{font-size:13px;color:#888;margin-top:2px}
.actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.btn{background:transparent;border:0.5px solid #ccc;border-radius:8px;padding:7px 14px;font-size:13px;cursor:pointer;color:#1a1a1a;transition:background 0.15s;font-family:inherit}
.btn:hover{background:#f0f0ee}
.btn.primary{background:#dbeafe;border-color:#93c5fd;color:#1e40af;font-weight:500}
.btn.primary:hover{opacity:0.85}
.btn.danger{color:#b91c1c;border-color:#fca5a5}
.btn.danger:hover{background:#fef2f2}
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:1.5rem}
@media(max-width:700px){.stats{grid-template-columns:repeat(2,1fr)}}
.stat{background:#fff;border-radius:8px;padding:12px 14px;border:0.5px solid #e5e5e3}
.stat-label{font-size:12px;color:#888;margin-bottom:4px}
.stat-val{font-size:20px;font-weight:500}
.filters{display:grid;grid-template-columns:repeat(auto-fit,minmax(115px,1fr));gap:8px;margin-bottom:1.25rem}
.filters input,.filters select{width:100%;font-size:13px;padding:7px 10px;border-radius:8px;border:0.5px solid #ddd;background:#fff;color:#1a1a1a;font-family:inherit}
.table-wrap{overflow-x:auto;border:0.5px solid #e5e5e3;border-radius:12px;background:#fff}
table{width:100%;border-collapse:collapse;font-size:13px}
thead{background:#f8f8f6}
th{padding:10px 10px;text-align:left;font-weight:500;font-size:11px;color:#888;white-space:nowrap;border-bottom:0.5px solid #e5e5e3}
td{padding:8px 10px;border-bottom:0.5px solid #e5e5e3;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafaf8}
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.badge-gb{background:#f3e8ff;color:#6b21a8}
.badge-dd,.badge-dc,.badge-dg{background:#dcfce7;color:#166534}
.badge-mdc,.badge-mc,.badge-moc{background:#fef9c3;color:#854d0e}
.badge-ad,.badge-ag,.badge-bu{background:#ffedd5;color:#9a3412}
.pied-d{display:inline-block;padding:2px 6px;border-radius:4px;font-size:11px;font-weight:500;background:#dbeafe;color:#1e40af}
.pied-g{display:inline-block;padding:2px 6px;border-radius:4px;font-size:11px;font-weight:500;background:#fce7f3;color:#9d174d}
.pied-2{display:inline-block;padding:2px 6px;border-radius:4px;font-size:11px;font-weight:500;background:#dcfce7;color:#166534}
.stars{color:#f59e0b;font-size:12px}
.vm-cell{font-variant-numeric:tabular-nums;white-space:nowrap}
.evol-up{color:#16a34a;font-size:10px}
.evol-dn{color:#dc2626;font-size:10px}
.notes-cell{max-width:110px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#888;font-size:12px}
.empty{text-align:center;padding:3rem;color:#bbb}
.count{font-size:12px;color:#888;margin-bottom:8px}
.tm-link{color:inherit;text-decoration:none;border-bottom:1.5px dashed #d1a832;cursor:pointer}
.tm-link:hover{color:#b45309}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:flex-start;justify-content:center;z-index:1000;padding:2rem 1rem;overflow-y:auto}
.modal{background:#fff;border:0.5px solid #e5e5e3;border-radius:12px;padding:1.5rem;width:100%;max-width:600px;margin:auto}
.modal-title{font-size:16px;font-weight:500;margin-bottom:1.25rem}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-grid .full{grid-column:1/-1}
.form-label{display:block;font-size:12px;color:#888;margin-bottom:4px}
.form-grid input,.form-grid select,.form-grid textarea{width:100%;font-size:13px;padding:7px 10px;border-radius:8px;border:0.5px solid #ddd;background:#fff;color:#1a1a1a;font-family:inherit}
.form-grid textarea{resize:vertical;min-height:60px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;padding-top:1rem;border-top:0.5px solid #e5e5e3}
.age-warn-form{font-size:11px;color:#b45309;margin-top:3px;display:none}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:#1a1a1a;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;z-index:9999;opacity:0;transition:opacity 0.3s;pointer-events:none}
.toast.show{opacity:1}
.section-title{font-size:11px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:0.05em;grid-column:1/-1;margin-top:6px;padding-bottom:4px;border-bottom:0.5px solid #e5e5e3}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div>
      <div class="title">Joueurs à suivre</div>
      <div class="subtitle">U23 max — VM max 20M€ — <span id="date-display"></span></div>
    </div>
    <div class="actions">
      <button class="btn" onclick="exportData()">⬇ Exporter JSON</button>
      <label class="btn" style="cursor:pointer">⬆ Importer JSON
        <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
      </label>
      <button class="btn primary" onclick="openModal(null)">+ Ajouter un joueur</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-label">Total joueurs</div><div class="stat-val" id="s-total">0</div></div>
    <div class="stat"><div class="stat-label">VM moy. actuelle</div><div class="stat-val" id="s-vm">—</div></div>
    <div class="stat"><div class="stat-label">Âge moyen</div><div class="stat-val" id="s-age">—</div></div>
    <div class="stat"><div class="stat-label">Postes</div><div class="stat-val" id="s-postes">—</div></div>
    <div class="stat"><div class="stat-label">Plus-value totale</div><div class="stat-val" id="s-plusvalue">—</div></div>
  </div>

  <div class="filters">
    <input type="text" id="f-search" placeholder="🔍 Rechercher..." oninput="render()">
    <select id="f-poste" onchange="render()">
      <option value="">Tous postes</option>
      <option>GB</option><option>DD</option><option>DC</option><option>DG</option>
      <option>MDC</option><option>MC</option><option>MOC</option>
      <option>AD</option><option>AG</option><option>BU</option>
    </select>
    <select id="f-nat" onchange="render()"><option value="">Toutes nationalités</option></select>
    <select id="f-pied" onchange="render()">
      <option value="">Tous pieds</option>
      <option value="D">Pied droit</option>
      <option value="G">Pied gauche</option>
      <option value="2">Les deux pieds</option>
    </select>
    <select id="f-stars" onchange="render()">
      <option value="">Toutes notes</option>
      <option value="5">5★</option><option value="4.5">4.5★+</option>
      <option value="4">4★+</option><option value="3">3★+</option><option value="0">À voir</option>
    </select>
    <input type="number" id="f-age-max" placeholder="Âge max" min="13" max="25" oninput="render()">
    <input type="number" id="f-vm-max" placeholder="VM max (M€)" step="0.5" oninput="render()">
    <select id="f-sort" onchange="render()">
      <option value="stars_desc">Note ↓</option>
      <option value="date_desc">Date ↓</option>
      <option value="date_asc">Date ↑</option>
      <option value="age_asc">Âge ↑</option>
      <option value="age_desc">Âge ↓</option>
      <option value="vm_desc">VM ↓</option>
      <option value="vm_asc">VM ↑</option>
      <option value="evol_desc">Plus-value ↓</option>
      <option value="nom_asc">Nom A→Z</option>
    </select>
  </div>

  <div class="count" id="count-line"></div>

  <div class="table-wrap">
    <table>
      <thead><tr>
        <th>#</th><th>Nom</th><th>Poste</th><th>Âge</th><th>Pied</th><th>Note</th>
        <th>Nationalité</th><th>Club</th><th>VM ajout</th><th>VM actuelle</th>
        <th>Évolution</th><th>Style</th><th>Notes</th><th>Date ajout</th><th></th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
    <div id="empty-state" class="empty" style="display:none">Aucun joueur trouvé</div>
  </div>
</div>

<div class="modal-bg" id="modal" style="display:none">
  <div class="modal">
    <div class="modal-title" id="modal-title">Nouveau joueur</div>
    <div class="form-grid">
      <div class="section-title">Identité</div>
      <div class="full">
        <label class="form-label">Nom complet *</label>
        <input type="text" id="f-nom" placeholder="ex: Kylian Mbappé">
      </div>
      <div>
        <label class="form-label">Poste *</label>
        <select id="f-fposte">
          <option value="">— choisir —</option>
          <option>GB</option><option>DD</option><option>DC</option><option>DG</option>
          <option>MDC</option><option>MC</option><option>MOC</option>
          <option>AD</option><option>AG</option><option>BU</option>
        </select>
      </div>
      <div>
        <label class="form-label">Âge</label>
        <input type="number" id="f-fage" min="13" max="40" placeholder="ex: 19" oninput="checkAge()">
        <div class="age-warn-form" id="age-warn">⚠ Plus de 23 ans</div>
      </div>
      <div>
        <label class="form-label">Pied fort</label>
        <select id="f-fpied">
          <option value="">— inconnu —</option>
          <option value="D">Droit</option>
          <option value="G">Gauche</option>
          <option value="2">Les deux</option>
        </select>
      </div>
      <div>
        <label class="form-label">Nationalité</label>
        <input type="text" id="f-fnat" placeholder="ex: Français">
      </div>
      <div>
        <label class="form-label">Club actuel</label>
        <input type="text" id="f-fclub" placeholder="ex: RC Lens">
      </div>
      <div class="section-title">Évaluation</div>
      <div>
        <label class="form-label">Note (★)</label>
        <select id="f-fstars">
          <option value="">À voir</option>
          <option value="1">1★</option><option value="1.5">1.5★</option>
          <option value="2">2★</option><option value="2.5">2.5★</option>
          <option value="3">3★</option><option value="3.5">3.5★</option>
          <option value="4">4★</option><option value="4.5">4.5★</option>
          <option value="5">5★</option>
        </select>
      </div>
      <div>
        <label class="form-label">Date d'ajout</label>
        <input type="date" id="f-fdate">
      </div>
      <div>
        <label class="form-label">VM à l'ajout (M€)</label>
        <input type="number" id="f-fvmadd" step="0.1" min="0" placeholder="ex: 5">
      </div>
      <div>
        <label class="form-label">VM actuelle (M€)</label>
        <input type="number" id="f-fvm" step="0.1" min="0" placeholder="ex: 5">
      </div>
      <div class="full">
        <label class="form-label">Style de joueur</label>
        <input type="text" id="f-fstyle" placeholder="ex: Ailier technique, bon dribbleur">
      </div>
      <div class="full">
        <label class="form-label">Notes / commentaires</label>
        <textarea id="f-fnotes" placeholder="Observations, matchs vus..."></textarea>
      </div>
      <div class="section-title">Lien</div>
      <div class="full">
        <label class="form-label">Lien Transfermarkt</label>
        <input type="text" id="f-ftm" placeholder="https://www.transfermarkt.fr/nom/profil/spieler/123456">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" id="btn-cancel" type="button">Annuler</button>
      <button class="btn primary" id="btn-save" type="button">Enregistrer</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

  try { localStorage.setItem('scouting_v8', JSON.stringify(players)); } catch(e) {}

  load();

  reader.onload = function(ev) {

      var imported = JSON.parse(ev.target.result);

}

}

}

}
function starsNum(p) {
  var m = (p.style || '').match(/^([\d\.]+)★/); return m ? parseFloat(m[1]) : null;
}
function starsDisplay(p) {
  var n = starsNum(p);
  if (!n) return '<span style="color:#bbb;font-size:11px">à voir</span>';
  var full = Math.floor(n), out = '';
  for (var i = 0; i < full; i++) out += '★';
  if (n % 1 >= 0.5) out += '½';
  return '<span class="stars">' + out + '</span><span style="font-size:11px;color:#888;margin-left:2px">' + n + '</span>';
}
function piedDisplay(p) {
  if (!p.pied) return '<span style="color:#ddd">—</span>';
  if (p.pied === 'D') return '<span class="pied-d">D</span>';
  if (p.pied === 'G') return '<span class="pied-g">G</span>';
  if (p.pied === '2') return '<span class="pied-2">2</span>';
  return '<span style="color:#bbb;font-size:11px">' + p.pied + '</span>';
}
function updateNatFilter() {
  var sel = document.getElementById('f-nat'); var cur = sel.value;
  var nats = [];
  players.forEach(function(p) { if (p.nat && nats.indexOf(p.nat) === -1) nats.push(p.nat); });
  nats.sort(function(a,b) { return a.localeCompare(b,'fr'); });
  sel.innerHTML = '<option value="">Toutes nationalités</option>' + nats.map(function(n) {
    return '<option' + (n === cur ? ' selected' : '') + '>' + n + '</option>';
  }).join('');
}
function updateStats(list) {
  document.getElementById('s-total').textContent = list.length;
  var vms = list.map(function(p){return parseFloat(p.vm);}).filter(function(v){return !isNaN(v)&&v>0;});
  document.getElementById('s-vm').textContent = vms.length ? (vms.reduce(function(a,b){return a+b;},0)/vms.length).toFixed(1)+'M€' : '—';
  var ages = list.map(function(p){return parseInt(p.age);}).filter(function(v){return !isNaN(v);});
  document.getElementById('s-age').textContent = ages.length ? (ages.reduce(function(a,b){return a+b;},0)/ages.length).toFixed(1) : '—';
  var postes = []; list.forEach(function(p){if(p.poste&&postes.indexOf(p.poste)===-1)postes.push(p.poste);});
  document.getElementById('s-postes').textContent = postes.length || '—';
  var pv = 0; list.forEach(function(p){pv+=(parseFloat(p.vm)||0)-(parseFloat(p.vm_add)||0);});
  document.getElementById('s-plusvalue').textContent = (pv>=0?'+':'')+pv.toFixed(1)+'M€';
}
function render() {
  load(); updateNatFilter();
  var search = document.getElementById('f-search').value.toLowerCase();
  var poste = document.getElementById('f-poste').value;
  var nat = document.getElementById('f-nat').value;
  var pied = document.getElementById('f-pied').value;
  var sf = document.getElementById('f-stars').value;
  var ageMax = document.getElementById('f-age-max').value;
  var vmMax = document.getElementById('f-vm-max').value;
  var sort = document.getElementById('f-sort').value;

  var list = players.filter(function(p) {
    if (search && !(
      (p.nom||'').toLowerCase().includes(search)||
      (p.club||'').toLowerCase().includes(search)||
      (p.nat||'').toLowerCase().includes(search)||
      (p.notes||'').toLowerCase().includes(search)
    )) return false;
    if (poste && p.poste !== poste) return false;
    if (nat && p.nat !== nat) return false;
    if (pied && p.pied !== pied) return false;
    if (ageMax && parseInt(p.age) > parseInt(ageMax)) return false;
    if (vmMax && parseFloat(p.vm) > parseFloat(vmMax)) return false;
    if (sf !== '') {
      var sn = starsNum(p);
      if (sf === '0') { if (sn !== null) return false; }
      else { if (!sn || sn < parseFloat(sf)) return false; }
    }
    return true;
  });

  var parts = sort.split('_'), key = parts[0], dir = parts[1];
  list.sort(function(a,b) {
    var va, vb;
    if (key==='stars'){va=starsNum(a)||-1;vb=starsNum(b)||-1;}
    else if(key==='date'){va=a.date||'0000';vb=b.date||'0000';}
    else if(key==='age'){va=parseInt(a.age)||0;vb=parseInt(b.age)||0;}
    else if(key==='vm'){va=parseFloat(a.vm)||0;vb=parseFloat(b.vm)||0;}
    else if(key==='evol'){va=(parseFloat(a.vm)||0)-(parseFloat(a.vm_add)||0);vb=(parseFloat(b.vm)||0)-(parseFloat(b.vm_add)||0);}
    else{va=(a.nom||'').toLowerCase();vb=(b.nom||'').toLowerCase();}
    if(va<vb)return dir==='asc'?-1:1;
    if(va>vb)return dir==='asc'?1:-1;
    return 0;
  });

  updateStats(list);
  document.getElementById('count-line').textContent = list.length+' joueur'+(list.length>1?'s':'')+(list.length!==players.length?' (filtré sur '+players.length+')':'');
  var tbody = document.getElementById('tbody');
  var empty = document.getElementById('empty-state');
  if (!list.length) { tbody.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display='none';

  tbody.innerHTML = list.map(function(p,i) {
    var bc='badge badge-'+(p.poste||'').toLowerCase();
    var va=parseFloat(p.vm_add)||0, vc=parseFloat(p.vm)||0, diff=vc-va;
    var evolHtml = diff>0?'<span class="evol-up">▲'+diff.toFixed(1)+'M</span>':
                   diff<0?'<span class="evol-dn">▼'+Math.abs(diff).toFixed(1)+'M</span>':
                   '<span style="color:#bbb;font-size:11px">—</span>';
    var ageWarn = parseInt(p.age)>23?' <span style="color:#b45309;font-size:10px">⚠</span>':'';
    var styleClean=(p.style||'').replace(/^[\d\.]+★\s*/,'');
    var nameHtml = (p.tm_url && p.tm_url.indexOf('/spieler/0')===-1)
      ? '<a href="'+p.tm_url+'" target="_blank" class="tm-link" title="Voir sur Transfermarkt">'+(p.nom||'—')+'</a>'
      : (p.nom||'—');
    return '<tr>'+
      '<td style="color:#bbb;font-size:11px">'+(i+1)+'</td>'+
      '<td style="font-weight:500;white-space:nowrap">'+nameHtml+'</td>'+
      '<td><span class="'+bc+'">'+(p.poste||'—')+'</span></td>'+
      '<td>'+(p.age||'—')+ageWarn+'</td>'+
      '<td>'+piedDisplay(p)+'</td>'+
      '<td>'+starsDisplay(p)+'</td>'+
      '<td style="font-size:12px;white-space:nowrap">'+(p.nat||'—')+'</td>'+
      '<td style="font-size:12px;white-space:nowrap">'+(p.club||'—')+'</td>'+
      '<td class="vm-cell">'+fmt(p.vm_add)+'</td>'+
      '<td class="vm-cell">'+fmt(p.vm)+'</td>'+
      '<td class="vm-cell">'+evolHtml+'</td>'+
      '<td class="notes-cell" title="'+styleClean.replace(/"/g,'&quot;')+'">'+( styleClean||'—')+'</td>'+
      '<td class="notes-cell" title="'+(p.notes||'').replace(/"/g,'&quot;')+'">'+(p.notes||'—')+'</td>'+
      '<td style="white-space:nowrap;color:#888;font-size:12px">'+fmtDate(p.date)+'</td>'+
      '<td style="white-space:nowrap">'+
        '<button class="btn" style="padding:4px 8px;font-size:12px;margin-right:4px" onclick="editPlayer(\''+p.id+'\')">✏</button>'+
        '<button class="btn danger" style="padding:4px 8px;font-size:12px" onclick="deletePlayer(\''+p.id+'\')">✕</button>'+
      '</td>'+
    '</tr>';
  }).join('');
}

function openModal(id) {
  editId = id || null;
  var p = id ? players.find(function(x){return x.id===id;}) : null;
  document.getElementById('modal-title').textContent = p ? 'Modifier — '+p.nom : 'Nouveau joueur';
  document.getElementById('f-nom').value = (p&&p.nom)||'';
  document.getElementById('f-fposte').value = (p&&p.poste)||'';
  document.getElementById('f-fage').value = (p&&p.age)||'';
  document.getElementById('f-fpied').value = (p&&p.pied)||'';
  var sn = p ? starsNum(p) : null;
  document.getElementById('f-fstars').value = sn||'';
  document.getElementById('f-fnat').value = (p&&p.nat)||'';
  document.getElementById('f-fclub').value = (p&&p.club)||'';
  document.getElementById('f-fvmadd').value = (p&&p.vm_add)||'';
  document.getElementById('f-fvm').value = (p&&p.vm)||'';
  document.getElementById('f-fdate').value = (p&&p.date)||new Date().toISOString().split('T')[0];
  document.getElementById('f-ftm').value = (p&&p.tm_url)||'';
  document.getElementById('f-fstyle').value = p ? (p.style||'').replace(/^[\d\.]+★\s*/,'') : '';
  document.getElementById('f-fnotes').value = (p&&p.notes)||'';
  document.getElementById('age-warn').style.display='none';
  document.getElementById('modal').style.display='flex';
}
function closeModal() { document.getElementById('modal').style.display='none'; editId=null; }
function checkAge() {
  var v=parseInt(document.getElementById('f-fage').value);
  document.getElementById('age-warn').style.display=(v&&v>23)?'block':'none';
}
function editPlayer(id) { load(); openModal(id); }
function deletePlayer(id) {
  if (!confirm('Supprimer ce joueur ?')) return;
  load(); players=players.filter(function(p){return p.id!==id;}); save(); render();
  showToast('Joueur supprimé');
}
function savePlayer() {
  var nom=document.getElementById('f-nom').value.trim();
  var poste=document.getElementById('f-fposte').value;
  if (!nom||!poste) { alert('Le nom et le poste sont obligatoires.'); return; }
  load();
  var existing=editId?players.find(function(p){return p.id===editId;}):null;
  var starsVal=document.getElementById('f-fstars').value;
  var styleText=document.getElementById('f-fstyle').value.trim();
  var styleField=starsVal?(starsVal+'★'+(styleText?' '+styleText:'')):styleText;
  var obj={
    id:editId||(Date.now().toString(36)+Math.random().toString(36).slice(2,5)),
    nom:nom, poste:poste,
    age:document.getElementById('f-fage').value,
    pied:document.getElementById('f-fpied').value,
    nat:document.getElementById('f-fnat').value.trim(),
    club:document.getElementById('f-fclub').value.trim(),
    vm_add:document.getElementById('f-fvmadd').value,
    vm:document.getElementById('f-fvm').value,
    date:existing?existing.date:document.getElementById('f-fdate').value,
    tm_url:document.getElementById('f-ftm').value.trim(),
    style:styleField,
    notes:document.getElementById('f-fnotes').value.trim()
  };
  if (editId) { var idx=players.findIndex(function(p){return p.id===editId;}); if(idx>=0)players[idx]=obj; }
  else players.push(obj);
  save(); closeModal(); render();
  showToast(editId?'Joueur modifié !':'Joueur ajouté !');
}

document.getElementById('btn-cancel').addEventListener('click', closeModal);
document.getElementById('btn-save').addEventListener('click', savePlayer);
document.getElementById('modal').addEventListener('click', function(e){if(e.target===document.getElementById('modal'))closeModal();});

document.getElementById('date-display').textContent='Mis à jour le '+new Date().toLocaleDateString('fr-FR');
load();
if (players.length===0) { players=PRELOADED.map(function(p){return Object.assign({},p);}); save(); }
render();
</script>
</body>
